name: release

# Pushing a version tag builds the four release binaries and attaches them to
# the tag's GitHub release — the install script downloads these, so nothing is
# ever compiled on a user's machine.
on:
  push:
    tags: ["v*"]
  # Rebuild any existing tag's assets from CI — replaces anything attached by
  # hand with binaries whose provenance is this workflow's own run log.
  workflow_dispatch:
    inputs:
      tag:
        description: "existing tag to (re)build assets for"
        required: true

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: Build darwin/linux × amd64/arm64
        run: |
          # Every dabs embeds the egress forwarder — without it proxy egress
          # refuses at boot (egressforwarder/forwarder/embed_off.go). The
          # forwarder always runs LINUX (boxes are linux) at the box's arch, so
          # rebuild forward.bin for each target arch before embedding it, and
          # build dabs with -tags withforwarder (mirrors util/reinstall.sh).
          for os in darwin linux; do for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch CGO_ENABLED=0 \
              go build -o egressforwarder/forwarder/forward.bin ./egressforwarder/cmd/forward
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" -tags withforwarder \
                -o "dist/dabs_${os}_${arch}" .
          done; done
          (cd dist && shasum -a 256 dabs_* > SHA256SUMS)
          ls -la dist/
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          # A tag push reaches here with no release object yet, so create it on
          # first sight (notes from the annotated tag); a re-run finds it and
          # just replaces the assets. Either way the tag alone ships a release.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$tag" --notes-from-tag
          fi
