name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  # The e2e suite drives the real dabs CLI and rewrites $HOME/.dabs — so it only
  # runs somewhere sandboxed. Locally that is the dabseption docker box
  # (./run_e2e.sh); here the runner itself is the sandbox: a throwaway hermetic
  # VM, so no outer box is needed. The suite's guard accepts GITHUB_ACTIONS as
  # that sandbox.
  #
  # The suite never names a driver — dabs picks the platform's own; this job's
  # steps provision whatever that currently needs on Linux. Other platforms
  # would be sibling jobs with their own provisioning.
  e2e-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build overlay-enabled bubblewrap, and let it have user namespaces
        run: |
          # Ubuntu's packaged bubblewrap (0.9) has no overlay support; the bwrap
          # driver needs it. Build 0.11 from source exactly as the dabseption
          # box image does (non-setuid, overlay-enabled).
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libcap-dev pkg-config
          # Unpinned supply-chain surface: the tarball is fetched over the network
          # without checksum verification. Harden with a sha256 check.
          curl -fsSL https://github.com/containers/bubblewrap/releases/download/v0.11.0/bubblewrap-0.11.0.tar.xz -o /tmp/bw.tar.xz
          cd /tmp && tar xf bw.tar.xz && cd bubblewrap-0.11.0
          meson setup _build --prefix=/usr/local -Dtests=false -Dman=disabled
          ninja -C _build && sudo ninja -C _build install
          bwrap --version
          # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor,
          # which is exactly what bwrap needs. The runner is disposable.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install bun (the proxy egress engine's host-side runtime)
        # Proxy egress starts a bun-run engine on the host; the e2e suite runs on
        # the runner itself, so bun must be on the runner's PATH. openssl (leaf
        # cert minting) ships with the ubuntu image.
        run: |
          # Unpinned supply-chain surface: piping the install script straight to
          # bash runs unverified remote code. Harden with a pinned installer and
          # checksum verification.
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Build dabs onto PATH (with the embedded forwarder)
        # -tags withforwarder embeds the linux forwarder so proxy egress can
        # materialize and mount it; without it proxy egress refuses at boot.
        run: |
          GOOS=linux GOARCH="$(go env GOARCH)" CGO_ENABLED=0 \
            go build -o egressforwarder/forwarder/forward.bin ./egressforwarder/cmd/forward
          go build -tags withforwarder -o /usr/local/bin/dabs .
        env:
          CGO_ENABLED: "0"

      - name: Stage the suite's inner-box image
        # Locally the dabseption box Dockerfile stages this with a COPY --from;
        # here the same stage is built directly and exported as the flattened
        # rootfs a bwrap image is — identical bytes, no outer box.
        run: |
          docker build --target e2ebase -t dabs-e2ebase -f test/e2e/box/Dockerfile .
          id=$(docker create dabs-e2ebase)
          mkdir -p "$HOME/.dabs/images/dabs-e2e/rootfs"
          docker export "$id" | tar -x -C "$HOME/.dabs/images/dabs-e2e/rootfs"
          docker rm "$id" >/dev/null
          printf '%s' '{"env":["PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"],"workdir":"/work"}' \
            > "$HOME/.dabs/images/dabs-e2e/image.json"

      - name: Run the e2e suite (hermetic)
        # The whole suite; the online subset self-skips (E2E_ONLINE unset).
        run: go test -tags e2e -v ./test/e2e

      - name: Run the online e2e subset
        # The tests that genuinely prove real-internet behavior, run with egress
        # open (the runner has network). Kept in sync with the suite's online(t)
        # calls and run_e2e.sh's ONLINE_RE.
        run: |
          E2E_ONLINE=1 go test -tags e2e -v \
            -run '^(TestEgressDenyList|TestProxyTerminateDomainsScopeInterception|TestEgressAllowlistDefaultDeny|TestEgressNoneCutsNetwork|TestProxyDoesNotFollowRedirects|TestProxyDirectIPThroughWindow|TestProxyOriginateForwards)$' \
            ./test/e2e
