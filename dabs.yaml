# Recipes for working ON dabs — run in a disposable box with `dabs recipe <name>`.
# This is how we test dabs itself; reusable by any maintainer.
# Recipes resolve bundled → ~/.dabs/recipes.yaml → this file (this file wins).
# The Claude boxes share one login dir, MOUNTED (never copied): the first box to
# run creates it, you /login inside once, and every later box is already logged in.
#
# No `default:` on purpose. A default is what a bare `dabs recipe <cmd>` APPENDS
# your command to, and every recipe here is either an agent or a build box — none is
# a shell, so any of them would make `dabs recipe` do something you did not ask for.
# With no default, `dabs recipe` falls back to the bundled `sh` box (a real shell) and
# `dabs recipe`/`build` with no name list the choices instead of guessing.

recipes:

  # dabs recipe claude — a fresh Claude Code box over the current repo, logged in
  # from the shared login dir below. dabs itself ships only generic recipes
  # (sh, wt, wtbox, scratch, scratchbox); this Claude box is project-specific
  # (it mounts YOUR login dir), so it lives here. This is the whole definition:
  # no mounts are hidden in code.
  claude:
    description: fresh Claude Code box over the current repo, logged in
    image: claude                         # reuse ~/.dabs/images/claude
                                          #   (built from the bundled image recipe on first use)
    command: [claude]                     # what to run once the box is up
    keep: true                            # keep the box after claude exits, so you can resume
    env:
      # Keep ALL Claude state in the mounted dir below, so login AND config land
      # in the vault. Without this, config goes to ~/.claude.json — a HOME-level
      # file outside the mount — and is lost with the box, forcing re-onboarding.
      CLAUDE_CONFIG_DIR: /root/.claude
    sources:
      # Claude's login and config, SHARED by every box that names this path — a
      # live mount, so a token refresh inside a box writes straight back to the
      # host and outlives it. mkmount, so the first box to run creates it empty:
      # Claude then reports "not logged in", you /login once, and every later box
      # is logged in. There is no separate login step.
      #
      # The `claude` image BANS the agent's own tools (Read/Bash) from reading
      # this dir — Claude Code still authenticates from it internally, but a
      # curious or compromised agent cannot cat .credentials.json out. The ban is
      # baked into the image, so it holds for every recipe that mounts it.
      - mkmount: ~/.dabs/shared/claude
        path: /root/.claude
      # Session transcripts, nested over the shared dir above. They live in the
      # PARENT PLACE's volume ($PARENT_VOLUME) — that is why they survive when this
      # box is reaped and load again for the next box on the same code, and why a
      # box's own volume (reaped with it) would be the wrong home for them.
      - mkmount: $PARENT_VOLUME/claude/projects
        path: /root/.claude/projects
      # The code — your current directory, mounted live so the agent's edits
      # persist on the host and you review them with normal git. Swap `mount:`
      # for `copy:` to hand the box a throwaway snapshot instead.
      - mount: .
        path: /work

  # dabs recipe confined-claude — the `claude` box, but the box NEVER holds the
  # real credential. It runs Claude Code with a fully DUMMY, read-only creds file;
  # the box's only egress is the dabs proxy engine, whose broker hook injects the
  # REAL token host-side on api.anthropic.com traffic and scrubs it back out of
  # every response. The real tokens live only in a host vault
  # (~/.dabs/broker/vault.json), born on the first in-box `/login`.
  confined-claude:
    description: Claude box that never holds the real credential (broker-injected)
    # The bundled claude image plus the linux forwarder proxy egress needs on the
    # apple driver (built from this checkout — see the Dockerfile). Bases on the
    # already-built dabs-claude image: run `dabs recipe claude` once first.
    image: { dockerfile: contrib/recipes/confined-claude.Dockerfile, context: . }
    command: [claude]
    keep: true
    env:
      CLAUDE_CONFIG_DIR: /root/.claude
    egress:
      # A bare domain matches the apex AND every subdomain, so this reaches api,
      # console (OAuth/refresh), statsig, etc.
      allow: "anthropic.com, claude.ai, claude.com"
      # Terminate the WHOLE managed set, not just api: the OAuth refresh rides
      # console.anthropic.com / claude.ai, and a leg left un-terminated would
      # tunnel the dummy token past the broker un-swapped.
      http_proxy:
        - tls: terminate
          domains: [anthropic.com, claude.ai, claude.com]
        - module: contrib/proxy/creds-inject-anthropic/broker.ts
          # vault: ~/.dabs/broker/vault.json   # default; the real tokens' only home
        - tls: originate
    sources:
      # The WHOLE config dir, persistent and shared by every confined box — its
      # OWN dir, never your real ~/.dabs/shared/claude. It carries settings.json,
      # onboarding state, theme AND the creds across boxes, so a box onboards
      # once, not every time. It starts EMPTY (logged out): the first box does one
      # /login, and the broker writes back a creds file that holds the DUMMY
      # tokens but Anthropic's REAL metadata (scopes, subscriptionType, expiresAt)
      # — the scrub rewrites only the token strings. From then on every box is
      # authenticated, and a refresh keeps expiresAt honest. The real token lives
      # only in the host vault; this dir only ever holds dummies.
      - mkmount: ~/.dabs/shared/confined-claude
        path: /root/.claude
      # Per-place session transcripts, nested over the shared config dir — they
      # live in $PARENT_VOLUME so they survive this box's reaping and reload for
      # the next box on the same code (same as the `claude` recipe).
      - mkmount: $PARENT_VOLUME/claude/projects
        path: /root/.claude/projects
      - mount: .
        path: /work

  # dabs recipe fresh-claude — a DETACHED, logged-OUT Claude Code box. It mounts
  # NOTHING from ~/.dabs/shared/claude: the box boots with an empty /root/.claude,
  # so `claude` reports "Not logged in" and forces a fresh `/login`. That login —
  # and everything else the box writes — is box-local and dies with the box; it
  # never touches your shared login dir or leaks your session history to the host.
  #
  # Agents: use when you want an isolated agent with throwaway/fresh auth — e.g.
  # reviewing UNTRUSTED code, where you must not expose your real Claude session.
  fresh-claude:
    description: detached logged-out Claude box with throwaway auth
    image: claude                         # same bundled image as `claude` (has Claude Code)
    command: [claude]                     # drops straight into the box → the /login flow
    env:
      # Pin ALL Claude state to a box-local dir. Nothing is mounted here, so the
      # dir starts empty (logged out) and is destroyed with the box — no vault.
      CLAUDE_CONFIG_DIR: /root/.claude
    sources:
      # ONLY the code — a fresh git branch off HEAD, mounted live. Deliberately
      # NO shared-login mount: that is what keeps this box logged out.
      - worktree: .
        path: /work

  # dabs recipe claudewt — like the `claude` recipe above, but the agent works
  # in a fresh git WORKTREE instead of your live tree. `worktree: .` cuts a new
  # branch off HEAD (`dabs/<id>`) at ~/.dabs/worktrees/<repo>-<id> and mounts it
  # live, so your working tree stays untouched — the worktree is kept after the
  # box exits to review and reap with `dabs worktrees`. The vault stays a plain
  # mount so token refreshes persist.
  #
  # NOTE: git is BLIND inside this box. A worktree's `.git` is only a pointer into
  # the parent repo's object store, which this static recipe doesn't mount — so
  # `git log/diff/commit` fail in-box. The agent EDITS files here; you commit and
  # review on the host (`dabs worktrees diff`). To get working git in-box, run a
  # recipe onto an EXISTING worktree with `dabs recipe <recipe> --worktree <wt>`:
  # it also mounts the parent `.git`, so the agent can commit and the commits
  # reconcile straight into the shared store.
  claudewt:
    description: Claude box working in a fresh git worktree
    image: claude
    command: [claude]
    keep: true                            # keep the box after claude exits, so you can resume
    env:
      CLAUDE_CONFIG_DIR: /root/.claude
    sources:
      - mkmount: ~/.dabs/shared/claude
        path: /root/.claude
      # Session transcripts in the PARENT PLACE's volume ($PARENT_VOLUME) — see the
      # `claude` recipe. That is why they persist when this box is reaped and reload
      # for the next box on the same code.
      - mkmount: $PARENT_VOLUME/claude/projects
        path: /root/.claude/projects
      - worktree: .
        path: /work

  # dabs INSIDE dabs. Both recipes below build dabs from /work and KEEP the box,
  # so you (or an agent) drive that dabs from the host by reaching in:
  #
  #   dabs recipe dabseption                     # → box kept; note the instance name
  #   dabs exec <instance> 'dabs recipe sh --detach' # the dabs in the box boots its OWN box
  #   dabs exec <instance> -- dabs ls
  #
  # They differ in ONE thing — what lands at /work:
  #   dabseption    the cwd, mounted live  → test the code you have right now
  #   dabseptionwt  a FRESH worktree       → test a branch without touching the cwd
  # Everything else is shared: one Dockerfile, same target, keep, command. (Two
  # image TAGS, though — a Dockerfile-backed image is named after its recipe, so
  # `dabs build dabseption` does not also ready dabseptionwt. Layer cache makes
  # the second build cheap.)
  #
  # The box is PRIVILEGED (target below) and carries bubblewrap, so the built
  # dabs boots its driver fleet and runs for real — full CLI, recipe resolution,
  # cast/worktree/keep/rm logic, git, error paths — sandboxed in the box while
  # the driver (you, an agent) stays OUTSIDE on the host, unsandboxed.
  #
  # The box can boot NESTED boxes: the image stages a ready-built `shell` rootfs
  # (see the Dockerfile's COPY --from), so `dabs recipe sh --detach` / `dabs recipe sh`
  # work inside with no builder. `dabs build` still cannot run in there — it shells out to
  # docker, which the box has none of — and does not need to.
  dabseption:
    description: build and run the cwd's dabs in a kept box that can boot its own boxes
    image: &dabseption_image { dockerfile: contrib/recipes/dabseption.Dockerfile, context: . }
    target: &dabseption_target INTERNAL-docker-privileged-for-nested-sandboxing
    keep: true                            # keep the box alive after the build shell exits — exec in to test
    command: &dabseption_command [sh, -c, "cd /work && go build -o /usr/local/bin/dabs . && dabs --help 2>&1 | head -1; exec sh"]
    sources:
      - mount: .                          # the cwd, live — build and test the code you have now
        path: /work

  # Same box, but /work is a FRESH worktree cut off the current branch, so you can
  # `dabs recipe dabseptionwt`, switch the cwd back to main, and the box keeps
  # testing that branch. Trade-off: no parent .git is mounted, so git is BLIND
  # in-box — use `dabs recipe dabseptionwt --worktree <wt>` when a test needs
  # in-box git (it attaches an EXISTING worktree live and mounts its parent .git).
  dabseptionwt:
    description: build and run a branch's dabs in a kept box, from a fresh worktree
    image: *dabseption_image
    target: *dabseption_target
    keep: true
    command: *dabseption_command
    sources:
      - worktree: .                       # --worktree rewrites this: attach <wt> live + mount its parent .git
        path: /work

  # dabs recipe scribe — the machine the docs walkthrough suite (walkthroughs/) runs in.
  # It layers tuti and a RELEASED dabs onto the dabseption image, so a nested dabs
  # boots its own boxes while tuti photographs the TUI. Build order:
  # `dabs build dabseption` (readies the dabs-dabseption base), then
  # `dabs build scribe`. Kept and privileged like dabseption; drive it from the
  # host with `dabs exec <box> 'cd /work/walkthroughs && python3 -m pytest -q'`.
  #
  # Unlike dabseption, this box does NOT build dabs from /work — it installs the
  # latest RELEASED binary in the Dockerfile (see scribe.Dockerfile), because the
  # goldens must document what a released dabs prints. /work is this repo, live,
  # so re-blessed goldens and updated docs land back on the host.
  scribe:
    description: tuti + a released dabs, for driving the docs walkthrough suite
    image: { dockerfile: contrib/recipes/scribe.Dockerfile, context: . }
    target: INTERNAL-docker-privileged-for-nested-sandboxing
    keep: true
    command: [sh]
    sources:
      - mount: .
        path: /work

  # Agents: use when you changed dabs's CLI, help text, errors, or recipes and
  # want to know whether a brand-new user can still figure it out. Drops a naive
  # Haiku on a fresh machine that has ONLY dabs (built from this tree) + Claude
  # Code, and asks it to discover and use dabs on its own — then report friction
  # and bugs. If the dumb user gets stuck, that is a UX bug.
  #
  # The naive-user brief lives in a skill (skills/dumb-user) — the recipe only
  # provisions the box (build dabs, mount the skill where Claude Code looks) and
  # asks Claude to run it.
  dumb-user:
    description: naive user tries to discover dabs on a fresh machine
    image: { dockerfile: contrib/recipes/dumb-user.Dockerfile, context: . }
    env: { CLAUDE_CONFIG_DIR: /root/.claude }
    command: [sh, -c, "cd /work && go build -o /usr/local/bin/dabs . && exec claude -p 'Use the dumb-user skill.' --model claude-haiku-4-5 --allowedTools Bash Write Read Edit Skill"]
    sources:
      - mkmount: ~/.dabs/shared/claude
        path: /root/.claude
      - copy: .                           # the agent builds dabs from this copy and tries it
        path: /work
      - mount: skills/dumb-user           # the naive-user skill — mounted where Claude Code discovers project skills
        path: /work/.claude/skills/dumb-user
        ro: true
